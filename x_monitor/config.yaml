# Verefy X Monitor — Configuration
# ====================================
# Edit this file to add/remove accounts and keyword searches.
# Changes take effect on the next scheduled run (no code changes needed).
#
# HOW IT WORKS:
# - Account posts are fetched via `from:username since:<date>` (no keyword filtering)
# - Keyword searches run across ALL of X using `advanced_search`
# - Posts are deduped across all groups
# - Digest email organizes results by group with descriptions as reply guidance
#
# TIER SYSTEM:
# - "hot" groups run 2x/day (morning + evening) — time-sensitive opportunities
# - "daily" groups run 1x/day at 13:00 UTC — general monitoring
# - Full run processes ALL groups; hot run only processes tier: hot
#
# CHANGELOG:
# 2026-03-22: Noise reduction pass based on 2 weeks of digest analysis.
#   - Group 7: Replaced "fake news reputation" (zero enterprise hits, only
#     political/personal disputes) with "fake news stock price" and
#     "disinformation company brand" (min_likes: 3).
#   - Group 8: Changed "Verefy" → "Verefy AI" to filter InterLink crypto
#     false positives (#Verefy hashtag). Added -Fittipaldi to "Filipe Altoe"
#     query to exclude Cassiano Altoe finance influencer list false positive.
#   - Group 6: Confirmed "Logically.ai" and "Blackbird.ai" already fixed
#     in prior commit (d6275e6).
#
# 2026-03-17: Fixed zero keyword search results. All queries shortened from
#   3-5 words to 2-3 words. Twitter AND-search requires ALL words present —
#   long queries like "viral misinformation early detection" never match in
#   26h. Also lowered min_likes thresholds and default min_likes_search
#   (10 → 3). Modeled after working Bluesky config which returns 20-60+/run.
#
# ACCOUNT HANDLE VERIFICATION:
# Handles marked [VERIFY] need confirmation before first deploy.
# After first run, check which accounts returned zero results — those
# likely have wrong handles. Fix and push.

settings:
  lookback_hours_daily: 26
  lookback_hours_hot: 13
  min_likes_accounts: 2
  min_likes_search: 3
  email_to: "filipe.altoe@gmail.com"
  email_from: "Verefy X Monitor <monitor@buzarchitect.ai>"

# Relevance keywords — account posts are only included if they contain
# at least one of these (case-insensitive). Keyword search results skip
# this filter since they're already topic-filtered by the query.
#
# KEEP THESE SPECIFIC. Generic terms like "AI", "news", "social media"
# cause massive false positives. If an account's general posts aren't
# relevant, remove the account — don't try to filter with broad keywords.
relevance_keywords:
  # Core domain
  - "disinformation"
  - "misinformation"
  - "misinfo"
  - "disinfo"
  - "false claim"
  - "fake news"
  - "fact-check"
  - "fact check"
  - "factcheck"
  - "deepfake"
  - "deep fake"
  - "synthetic media"
  - "AI-generated"
  - "coordinated inauthentic"
  - "information operation"
  - "info ops"
  - "information warfare"
  - "foreign interference"
  # Platform and moderation
  - "content moderation"
  - "trust and safety"
  - "trust & safety"
  - "platform integrity"
  - "platform governance"
  - "algorithmic amplification"
  # Detection and verification
  - "claim detection"
  - "claim verification"
  - "automated verification"
  - "viral prediction"
  - "virality"
  - "early warning"
  - "prebunking"
  - "debunking"
  - "narrative detection"
  # Regulatory
  - "Digital Services Act"
  - "DSA"
  - "AI Act"
  - "EDMO"
  - "election integrity"
  - "election interference"
  # Impact
  - "brand attack"
  - "reputational risk"
  - "stock manipulation"
  - "impersonation"
  # Research
  - "explainability"
  - "XAI"
  - "computational propaganda"
  # Portuguese / Brazilian
  - "desinformação"
  - "verificação"
  - "notícia falsa"

groups:
  # ===================================================================
  # GROUP 1: Disinformation Researchers & Academics
  # ===================================================================
  - name: "Disinformation Researchers & Academics"
    tier: daily
    description: >
      Reply when they discuss detection methods, platform accountability,
      or research findings. Your angle: researcher-to-researcher. Cite
      your IJCAI/UMAP work. Add perspective on the intervention gap
      (detection alone isn't enough — you need prediction + verification
      + response generation). Never sell — contribute expertise.
    accounts:
      - username: DFRLab
        label: Atlantic Council Digital Forensic Research Lab
      - username: clairewardle
        label: "Claire Wardle (First Draft founder)"           # [VERIFY]
      - username: CraigSilverman
        label: "Craig Silverman (ProPublica, misinfo reporter)" # [VERIFY]
      - username: alexstamos
        label: "Alex Stamos (Stanford Internet Observatory)"
      - username: ShortBenShort
        label: "Ben Nimmo (Meta, formerly DFRLab)"              # [VERIFY]
      - username: juliapossetti
        label: "Julie Posetti (ICFJ)"                          # [VERIFY]
    # CHANGED 2026-03-17: Shortened all queries from 3-5 words to 2 words.
    # Twitter AND-search requires ALL words to appear — 3-5 word queries
    # returned 0 results across every run. Bluesky config (2-word queries)
    # returns 20-60+ posts/run as reference.
    keyword_searches:
      - query: "disinformation detection"
        min_likes: 2
      - query: "automated fact checking"
        min_likes: 2
      - query: "misinformation prediction"
        min_likes: 2
      - query: "viral misinformation"
        min_likes: 2
      - query: "computational propaganda"
        min_likes: 2
      - query: "prebunking debunking"
        min_likes: 2

  # ===================================================================
  # GROUP 2: EU Policy & Regulation
  # ===================================================================
  - name: "EU Policy & Regulation"
    tier: daily
    description: >
      Engage when DSA enforcement, EDMO developments, or AI Act
      implications for content moderation are discussed. Your angle:
      regulatory alignment — Verefy is building the technology the
      regulation envisions. Position as European deep-tech aligned
      with EU values. Don't be partisan — be technical.
    accounts:
      - username: EU_Commission
        label: European Commission
      - username: EDMO_EUI
        label: "European Digital Media Observatory"
      - username: ThierryBreton
        label: "Thierry Breton (former EU Commissioner)"        # [VERIFY]
    keyword_searches:
      - query: "Digital Services Act"
        min_likes: 3
      - query: "EDMO disinformation"
        min_likes: 0
      - query: "AI Act moderation"
        min_likes: 3
      - query: "DSA platform enforcement"
        min_likes: 3
      - query: "EU election disinformation"
        min_likes: 2

  # ===================================================================
  # GROUP 3: Journalism & Media
  # ===================================================================
  - name: "Journalism & Media"
    tier: daily
    description: >
      Reply when journalists discuss fact-checking tools, newsroom
      technology, AI in journalism, or misinformation challenges.
      Your angle: practitioner empathy — you work with Polígrafo,
      you understand newsroom constraints. Speak their language
      (editorial workflow, time pressure, verification standards).
    accounts:
      - username: Poynter
        label: Poynter Institute
      - username: factchecknet
        label: "International Fact-Checking Network (IFCN)"     # [VERIFY]
      - username: RSF_en
        label: "Reporters Without Borders"
      - username: pressfreedom
        label: "Committee to Protect Journalists"               # [VERIFY]
      - username: AFPFactCheck
        label: "AFP Fact Check"                                 # [VERIFY]
      - username: FullFact
        label: "Full Fact (UK)"
      - username: Poligrafo_PT
        label: "Polígrafo (partner — Fernando's platform)"      # [VERIFY]
    keyword_searches:
      - query: "newsroom fact checking"
        min_likes: 2
      - query: "AI journalism verification"
        min_likes: 2
      - query: "claim verification"
        min_likes: 2
      - query: "IFCN fact checking"
        min_likes: 2
      - query: "newsroom misinformation"
        min_likes: 2

  # ===================================================================
  # GROUP 4: Trust & Safety Professionals
  # ===================================================================
  - name: "Trust & Safety Professionals"
    tier: daily
    description: >
      Engage when platform T&S leaders or practitioners discuss
      content moderation at scale, detection latency, or limits of
      platform-side solutions. Your angle: enterprise-side defense
      COMPLEMENTS platform moderation. You're not attacking platforms
      — you're solving what they can't (protecting specific orgs
      proactively).
    accounts:
      - username: evelyndouek
        label: "Evelyn Douek (Stanford, platform governance)"   # [VERIFY]
      - username: daborellekeller
        label: "Daphne Keller (Stanford, platform regulation)"  # [VERIFY]
    keyword_searches:
      - query: "trust safety moderation"
        min_likes: 3
      - query: "content moderation scaling"
        min_likes: 3
      - query: "platform transparency misinfo"
        min_likes: 3
      - query: "trust safety detection"
        min_likes: 3

  # ===================================================================
  # GROUP 5: Competitor Accounts  [DAILY]
  # ===================================================================
  - name: "Competitor Accounts"
    tier: daily
    description: >
      Track competitor announcements, partnerships, funding rounds,
      and positioning shifts. Do NOT reply to competitor posts —
      monitor only. Flag any competitor entering the prediction +
      verification + intervention space Verefy occupies.
    accounts:
      - username: logaboricallyai
        label: "Logically.AI ($15M/yr, direct competitor)"      # [VERIFY]
      - username: newswhip
        label: "NewsWhip ($11.8M/yr, closest to fact-checking)" # [VERIFY]
      - username: blackbird_ai
        label: "Blackbird.AI (enterprise brand protection)"     # [VERIFY]
    keyword_searches: []

  # ===================================================================
  # GROUP 6: Competitor & Market Intelligence  [HOT — 2x/day]
  # ===================================================================
  - name: "Competitor & Market Intelligence"
    tier: hot
    description: >
      Track competitor product launches, funding, and market moves.
      Also captures new entrants. Do NOT reply — intelligence only.
      Feed insights into investor updates and positioning.
    keyword_searches:
      - query: "Logically.ai"
        min_likes: 0
      - query: "Meltwater misinformation"
        min_likes: 2
      - query: "NewsWhip"
        min_likes: 0
      - query: "Blackbird.ai"
        min_likes: 0
      - query: "disinformation startup"
        min_likes: 3
      - query: "misinfo detection platform"
        min_likes: 2
      - query: "disinformation SaaS"
        min_likes: 3

  # ===================================================================
  # GROUP 7: Enterprise Brand Attacks & Incidents  [HOT — 2x/day]
  # ===================================================================
  - name: "Enterprise Brand Attacks & Incidents"
    tier: hot
    description: >
      Real-time incidents of disinformation targeting enterprises or
      public figures. These are CONTENT OPPORTUNITIES — post retrospective
      analysis showing the detection window that matters. Be analytical
      and empathetic, NEVER opportunistic. Frame as "here's what research
      tells us about incidents like this" not "you should have used our
      product."
    accounts: []
    keyword_searches:
      - query: "fake tweet stock"
        min_likes: 5
      - query: "disinformation brand attack"
        min_likes: 5
      - query: "false claim stock"
        min_likes: 5
      - query: "impersonation brand"
        min_likes: 3
      - query: "coordinated inauthentic"
        min_likes: 3
      - query: "deepfake CEO"
        min_likes: 3
      # ✂️ REMOVED: "fake news reputation" (Mar 22). In 2 weeks of digests,
      #    zero enterprise incidents — only political disputes and personal
      #    grievances (South African mayor, Canadian columnist, Turkish football,
      #    K-pop fans). Replaced with more targeted queries below.
      - query: "fake news stock price"
        min_likes: 3
      - query: "disinformation company brand"
        min_likes: 3
      - query: "misinformation pharmaceutical"
        min_likes: 5

  # ===================================================================
  # GROUP 8: Self-Mentions & Brand  [HOT — 2x/day]
  # ===================================================================
  - name: "Self-Mentions & Brand"
    tier: hot
    description: >
      Any mention of Verefy, Filipe, or related coverage. Respond to
      EVERYTHING — positive mentions get a thank-you, questions get a
      direct answer, criticism gets a thoughtful response. This is
      reputation management.
    accounts: []
    keyword_searches:
      # ✏️ CHANGED: "Verefy" → "Verefy AI" (Mar 22). Bare "Verefy" matched
      #    InterLink crypto project using #Verefy hashtag — false positive in
      #    4+ consecutive digests. Mirrors fix applied to Bluesky config Feb 21.
      - query: "Verefy AI"
        min_likes: 0
      - query: "verefy.ai"
        min_likes: 0
      # ✏️ CHANGED: Added -Fittipaldi exclusion (Mar 22). twitterapi.io
      #    advanced_search treats "Filipe Altoe" as AND (both words anywhere),
      #    not exact phrase — matched Brazilian finance influencer list with
      #    "Filipe Fittipaldi" posted by @cassianoma (Cassiano Altoe) in 5+
      #    consecutive digests. -Fittipaldi uses Twitter's negation operator.
      - query: "Filipe Altoe -Fittipaldi"
        min_likes: 0
      - query: "Polígrafo AI"
        min_likes: 0
      - query: "INESC-ID disinformation"
        min_likes: 0

# ===================================================================
# SPECIAL CAMPAIGNS
# ===================================================================
# Time-bounded monitoring that auto-activates and deactivates.
# The script checks today's date against each phase's window.
# Only active phases are included in the run. Future/expired phases
# are silently skipped.
#
# Add new campaigns here — they sit dormant until their start date.

campaigns:

  # -----------------------------------------------------------------
  # PhD Defense & LinkedIn Launch (Q2 2026)
  # -----------------------------------------------------------------
  # UPDATE start/end dates when defense date is confirmed.
  # This is a content event: "I just defended my PhD, here's what
  # I'm building" is the highest-leverage LinkedIn post.
