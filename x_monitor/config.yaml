    description: >
      Post-defense: activate full LinkedIn strategy. Publish the origin
      story, update all profiles, shift from researcher to CEO + researcher.
    phases:
      - name: "Post-defense activation"
        start: "2026-06-01"          # PLACEHOLDER — update when confirmed
        end: "2026-06-14"
        tier: hot
