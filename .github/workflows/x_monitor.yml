name: X Monitor

on:
  schedule:
    - cron: '0 13 * * *'      # Daily full run at 13:00 UTC
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml python-dotenv

      - name: Run X monitor
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd x_monitor
          python monitor.py --tier full
