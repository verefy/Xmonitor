name: Enrich Google Alerts

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      send_digest:
        description: 'Send email digest after enrichment'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r google_alerts_enricher/requirements.txt

      - name: Determine flags
        id: flags
        run: |
          FLAGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.send_digest }}" = "true" ]; then
            FLAGS="--send-digest"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="--send-digest"
          fi
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run enrichment pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
        run: |
          cd google_alerts_enricher
          python enrich_alerts.py ${{ steps.flags.outputs.flags }}
