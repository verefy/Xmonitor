name: Bluesky Monitor

on:
  schedule:
    - cron: '15 13 * * *'     # Daily full run at 13:15 UTC
    - cron: '15 8 * * *'      # Hot morning run at 08:15 UTC
    - cron: '15 20 * * *'     # Hot evening run at 20:15 UTC
  workflow_dispatch:
    inputs:
      tier:
        description: 'Run tier'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - hot

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml python-dotenv

      - name: Determine tier
        id: tier
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tier=${{ inputs.tier }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "15 13 * * *" ]; then
            echo "tier=all" >> $GITHUB_OUTPUT
          else
            echo "tier=hot" >> $GITHUB_OUTPUT
          fi

      - name: Restore seen posts cache
        uses: actions/cache@v4
        with:
          path: bluesky_monitor/seen_posts.json
          key: bluesky-seen-posts-${{ github.run_id }}
          restore-keys: bluesky-seen-posts-

      - name: Run Bluesky monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd bluesky_monitor
          python monitor_bluesky.py --config config_bluesky.yaml --tier ${{ steps.tier.outputs.tier }}