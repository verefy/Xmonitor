    phases:
      - name: "Post-defense activation"
        start: "2026-06-01"          # PLACEHOLDER — update when confirmed
        end: "2026-06-14"
        tier: hot
        manual_tasks:
          - task: "Cross-post PhD defense announcement to Bluesky"
            frequency: "Once, day after defense"
