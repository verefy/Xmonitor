# Verefy Bluesky Monitor — Configuration
# ========================================
# Monitors Bluesky for reply opportunities and competitive intelligence.
# Targets the disinformation research community that migrated from X.
#
# BLUESKY ENGAGEMENT REALITY:
# Bluesky is much smaller than X. Engagement numbers are 10-50x lower.
# A post with 5 likes on Bluesky is equivalent to 50-100 on X.
# Thresholds are set accordingly — do NOT raise them to X levels.
#
# HANDLE VERIFICATION:
# Handles marked [VERIFY] need confirmation. Open the URL in a browser:
# https://bsky.app/profile/{handle}
# If it 404s, search for the person at:
# https://bsky.app/search?q={name}
# Some users have custom domain handles (e.g., stamos.org instead of
# alexstamos.bsky.social). The config must use their actual handle.
#
# CHANGELOG:
# 2026-02-21: Noise reduction pass based on Feb 20-21 digest analysis
#   - Group 1: Dropped "fact checking AI" (too broad — caught AI skepticism,
#     AI-replacing-jobs discourse). Added "claim verification AI" + "AI fact verification".
#   - Group 2: Replaced "DSA enforcement" → "DSA platform enforcement" to avoid
#     matching Democratic Socialists of America. Added languages filter (en, pt).
#   - Group 3: Replaced "content moderation AI" → "content moderation scale" +
#     "trust safety detection". Added handle_exclude for ActivityPub bridge bots.
#   - Group 5: Replaced bare "Verefy" → "Verefy AI" to filter "verify" typos.
#
# 2026-02-23: Second noise reduction pass based on Feb 22-23 digest analysis
#   - Group 1: Bumped "misinformation research" min_likes 0 → 3. Noisiest term
#     across all 4 digests — catches casual use of both words (TTRPG drama, PCR
#     frustration, Discord/Persona complaints, "do your research" posts). min_likes: 3
#     would have filtered most noise while keeping all signal (Jay Van Bavel, Tania
#     Spencer, Philip Eil all had 4+ likes).
#   - Group 2: Added handle_exclude for ActivityPub bridge bots (heiseonline
#     .brid.gy duplicate) and congresstracker.bsky.social (matched "Digital Asset
#     Sales" + "Services Act" in congressional bill text — appeared Feb 22 and 23).
# 2026-03-05: Account additions and noise reduction based on Feb 27–Mar 5 digests
#   - Group 1: Added Shayan Sardarizadeh (BBC Verify) and Nick Diakopoulos
#     (Northwestern) to tracked accounts. Added handle_exclude for
#     labeler-prototype.bsky.social (community-notes bot, appeared in 4+ digests).

settings:
  lookback_hours_daily: 26
  lookback_hours_hot: 13
  min_likes_accounts: 0        # Bluesky engagement is very low — show all account posts
  min_likes_search: 0          # Same — filter manually from digest until volume warrants thresholds
  email_to: "filipe.altoe@gmail.com"
  email_from: "Verefy Bluesky Monitor <digest@buzarchitect.ai>"

# Relevance keywords — account posts are only included if they contain
# at least one of these (case-insensitive). Keyword search results skip
# this filter since they're already topic-filtered by the query.
relevance_keywords:
  # Core domain
  - "disinformation"
  - "misinformation"
  - "misinfo"
  - "disinfo"
  - "false claim"
  - "fake news"
  - "fact-check"
  - "fact check"
  - "factcheck"
  - "deepfake"
  - "deep fake"
  - "synthetic media"
  - "AI-generated"
  - "coordinated inauthentic"
  - "information operation"
  - "info ops"
  - "information warfare"
  - "foreign interference"
  # Platform and moderation
  - "content moderation"
  - "trust and safety"
  - "trust & safety"
  - "platform integrity"
  - "platform governance"
  - "algorithmic amplification"
  # Detection and verification
  - "claim detection"
  - "claim verification"
  - "automated verification"
  - "viral prediction"
  - "virality"
  - "early warning"
  - "prebunking"
  - "debunking"
  - "narrative detection"
  # Regulatory
  - "Digital Services Act"
  - "DSA"
  - "AI Act"
  - "EDMO"
  - "election integrity"
  - "election interference"
  # Impact
  - "brand attack"
  - "reputational risk"
  - "impersonation"
  # Research
  - "explainability"
  - "XAI"
  - "computational propaganda"
  # Portuguese / Brazilian
  - "desinformação"
  - "verificação"
  - "notícia falsa"

groups:
  # ===================================================================
  # GROUP 1: Disinformation Researchers & Academics
  # ===================================================================
  # These are the accounts that LEFT X and moved here.
  # This is the primary reason the Bluesky monitor exists.
  - name: "Disinformation Researchers & Academics"
    tier: daily
    description: >
      Reply when they discuss detection methods, platform accountability,
      or research findings. Your angle: researcher-to-researcher. Cite
      your IJCAI/UMAP work. Add perspective on the intervention gap
      (detection alone isn't enough — you need prediction + verification
      + response generation). Never sell — contribute expertise.
      NOTE: These are accounts that migrated FROM X. They are active here.
    handle_exclude:
      - "labeler-prototype.bsky.social"
      - "epsteinweb.bsky.social"
    accounts:
      # ── Confirmed migrated from X ──
      - username: katestarbird.bsky.social
        label: "Kate Starbird (UW, crisis informatics)"         # 89K followers, very active
      # ── Active on Bluesky ──
      - username: stamos.org
        label: "Alex Stamos (Stanford Internet Observatory)"
      - username: clairewardle.bsky.social
        label: "Claire Wardle (First Draft founder)"            # [VERIFY]
      - username: craigsilverman.bsky.social
        label: "Craig Silverman (ProPublica)"                   # [VERIFY]
      - username: benimmo.bsky.social
        label: "Ben Nimmo (Meta, formerly DFRLab)"
      - username: juliapossetti.bsky.social
        label: "Julie Posetti (ICFJ)"                          # [VERIFY]
      - username: dfrlab.bsky.social
        label: "Atlantic Council DFRLab"                        # [VERIFY]
      - username: shayan86.bsky.social
        label: "Shayan Sardarizadeh (BBC Verify, senior journalist)"
      - username: ndiakopoulos.bsky.social
        label: "Nick Diakopoulos (Northwestern, computational journalism)"
      - username: shayan86.bsky.social
        label: "Shayan Sardarizadeh (BBC Verify, senior journalist)"
      - username: ndiakopoulos.bsky.social
        label: "Nick Diakopoulos (Northwestern, computational journalism)"
    keyword_searches:
      - query: "disinformation detection"
        min_likes: 0
      - query: "misinformation research"
        # ✏️ CHANGED min_likes: 0 → 3 (Feb 23). Noisiest term across 4 digests —
        #    catches casual use of both words. min_likes: 3 filters TTRPG drama,
        #    PCR frustration, Discord complaints while keeping genuine researchers
        #    (Van Bavel 10♥, Spencer 4♥, Philip Eil 5♥ all clear the threshold).
        min_likes: 3
      # ✂️ REMOVED: "fact checking AI" — too broad, caught AI skepticism hot takes,
      #    AI-replacing-jobs posts, general AI rants (Justin McElroy, TecMysT, Ben Hall,
      #    LaurelLeaves across Feb 20-21 digests). "automated fact checking" below
      #    already covers the domain-relevant subset.
      - query: "automated fact checking"
        min_likes: 0
      - query: "viral misinformation"
        min_likes: 0
      - query: "computational propaganda"
        min_likes: 0
      - query: "prebunking debunking"
        min_likes: 0
      # ✅ ADDED: More precise replacements for dropped "fact checking AI"
      - query: "claim verification AI"
        min_likes: 0
      - query: "AI fact verification"
        min_likes: 0

  # ===================================================================
  # GROUP 2: EU Policy & Regulation
  # ===================================================================
  - name: "EU Policy & Regulation"
    tier: daily
    description: >
      Engage when DSA enforcement, EDMO developments, or AI Act
      implications for content moderation are discussed. Your angle:
      regulatory alignment — Verefy is building the technology the
      regulation envisions. Position as European deep-tech aligned
      with EU values. Don't be partisan — be technical.
      NOTE: EU DisinfoLab left X for Bluesky specifically. European Commission active here.
    # ✅ ADDED: Language filter — drops German, Italian, French posts we can't
    # engage with authentically (Maja Göpel, coffeeholic, Anis, Valigia Blu,
    # FluxFM, Little Think Tank across Feb 20-21 digests — ~1/3 of group output)
    languages:
      - "en"
      - "pt"
    # ✅ ADDED (Feb 23): Exclude ActivityPub bridge bots and known false-positive accounts
    # heiseonline .brid.gy duplicate appeared Feb 23; congresstracker matched
    # "Digital Asset Sales" + "Services Act" in congressional bill text on Feb 22 and 23.
    handle_exclude:
      - ".activitypub."
      - ".brid.gy"
      - "congresstracker.bsky.social"
      - "epsteinweb.bsky.social"
      - "heise.de"
    accounts:
      # ── Confirmed migrated from X ──
      - username: disinfo.eu
        label: "EU DisinfoLab (custom domain handle)"
      # ── Active on Bluesky ──
      - username: ec.europa.eu
        label: "European Commission"
      - username: edmo.bsky.social
        label: "European Digital Media Observatory"             # [VERIFY]
    keyword_searches:
      - query: "Digital Services Act"
        min_likes: 0
      # ✏️ CHANGED: "DSA enforcement" → "DSA platform enforcement"
      # Reason: bare "DSA enforcement" matched Democratic Socialists of America
      # (Dave Infante's Richmond DSA rally post, Feb 21 digest)
      - query: "DSA platform enforcement"
        min_likes: 0
      - query: "EDMO disinformation"
        min_likes: 0
      - query: "AI Act content moderation"
        min_likes: 0
      - query: "EU election integrity"
        min_likes: 0

  # ===================================================================
  # GROUP 3: Trust & Safety Professionals
  # ===================================================================
  - name: "Trust & Safety Professionals"
    tier: daily
    description: >
      Engage when platform T&S leaders discuss content moderation at
      scale, detection latency, or limits of platform-side solutions.
      Your angle: enterprise-side defense COMPLEMENTS platform moderation.
      NOTE: Yoel Roth explicitly left X ("isn't on this site anymore").
    # ✅ ADDED: Exclude ActivityPub bridge bot handles that repost content
    # from other platforms (SearchEngine bot, score 0, pure noise in Feb 21 digest)
    # NOTE: This requires the Python script to support handle_exclude filtering.
    # If not yet implemented, add a simple substring check in the filter step.
    handle_exclude:
      - ".activitypub."
      - ".brid.gy"
    accounts:
      # ── Confirmed migrated from X ──
      - username: yoyoel.com
        label: "Yoel Roth (former Twitter T&S, now Match Group)"
      # ── Active on Bluesky ──
      - username: evelyndouek.bsky.social
        label: "Evelyn Douek (Stanford, platform governance)"
      - username: daphnek.bsky.social
        label: "Daphne Keller (Stanford, platform regulation)"
      - username: benwhitelaw.bsky.social
        label: "Ben Whitelaw (Everything in Moderation, T&S industry)"
    keyword_searches:
      - query: "trust safety content moderation"
        min_likes: 0
      - query: "platform moderation scale"
        min_likes: 0
      # ✏️ CHANGED: "content moderation AI" → "content moderation scale" + "trust safety detection"
      # Reason: "content moderation AI" pulled user complaints about being moderated
      # (floyd NSFW joke Feb 20, Pinterest reshares, general platform gripes).
      # New terms target systems-level T&S discourse we actually want to engage with.
      - query: "content moderation scale"
        min_likes: 0
      - query: "trust safety detection"
        min_likes: 0

  # ===================================================================
  # GROUP 4: Journalism & Fact-Checking
  # ===================================================================
  - name: "Journalism & Fact-Checking"
    tier: daily
    description: >
      Reply when journalists discuss fact-checking tools, newsroom
      technology, AI in journalism, or misinformation challenges.
      Your angle: practitioner empathy — you work with Polígrafo,
      you understand newsroom constraints.
    handle_exclude:
      - "triall.ai"
    accounts:
      - username: poynter.bsky.social
        label: "Poynter Institute"                              # [VERIFY]
      - username: fullfact.bsky.social
        label: "Full Fact (UK)"                                 # [VERIFY]
      - username: factcheck.afp.com
        label: "AFP Fact Check (custom domain handle)"
      - username: jamesrball.com
        label: "James Ball (investigative journalist, author)"
    keyword_searches:
      - query: "fact checking newsroom"
        min_likes: 0
      - query: "AI journalism verification"
        min_likes: 0
      - query: "IFCN fact checking"
        min_likes: 0
      - query: "newsroom misinformation"
        min_likes: 0

  # ===================================================================
  # GROUP 5: Self-Mentions & Brand  [HOT — 2x/day]
  # ===================================================================
  - name: "Self-Mentions & Brand"
    tier: hot
    description: >
      Any mention of Verefy, Filipe, or related coverage. Respond to
      EVERYTHING. This group has min_likes: 0 everywhere — never
      miss a mention regardless of engagement.
    accounts: []
    keyword_searches:
      # ✏️ CHANGED: "Verefy" → "Verefy AI"
      # Reason: bare "Verefy" matched "verify" typos — Tor the Bull's
      # "age verefy" Discord complaint (Feb 20 digest). "Verefy AI" is
      # specific enough to catch real mentions while filtering misspellings.
      - query: "Verefy AI"
        min_likes: 0
      - query: "verefy.ai"
        min_likes: 0
      - query: "Filipe Altoe"
        min_likes: 0
      - query: "INESC-ID disinformation"
        min_likes: 0

